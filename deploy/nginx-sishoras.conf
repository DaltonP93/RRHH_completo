# /etc/nginx/sites-available/sishoras
# Config producción http://sishoras.saa.com.py
#
# Arquitectura:
#   /              → Next.js  (puerto 3000)   — UI
#   /api/          → Node API (puerto 4000)   — REST
#   /socket.io/    → Node API (puerto 4000)   — WebSocket tiempo real
#   /api/analytics/→ FastAPI  (puerto 5000)   — Reportes pesados con Pandas
#   /uploads/      → Node API (puerto 4000)   — Assets subidos (logos, etc.)
#
# IMPORTANTE: El servicio FastAPI (5000) NO debe exponerse en /analytics/
# porque colisiona con la ruta Next.js /analytics/[id]. Se accede vía
# /api/analytics/ que el Node API proxya internamente (o nginx directo).

server {
    listen 80;
    server_name sishoras.saa.com.py;

    # Headers de seguridad (hardening)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Tamaño máximo de uploads (logos, CSV empleados)
    client_max_body_size 10M;

    # ─── FastAPI analytics (movido a /api/analytics/) ─────────────
    location /api/analytics/ {
        rewrite ^/api/analytics/(.*) /$1 break;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ─── Node API REST ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ─── WebSocket ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ─── Uploads servidos desde Node API ───────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Next.js (debe ir último, catch-all) ───────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/sishoras.log;
    error_log  /var/log/nginx/sishoras.error.log;
}
