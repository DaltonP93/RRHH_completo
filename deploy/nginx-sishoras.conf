# /etc/nginx/sites-available/sishoras
# Config producción — sishoras.saa.com.py
#
# ─── ARQUITECTURA ─────────────────────────────────────────────────
#   /              → Next.js  (3000)
#   /api/          → Node API (4000)
#   /socket.io/    → Node API (4000) WebSocket
#   /api/analytics/→ FastAPI  (5000)
#   /uploads/      → Node API (4000) assets
#
# ─── INSTALACIÓN LET'S ENCRYPT ────────────────────────────────────
# 1. Copiar este archivo a /etc/nginx/sites-available/sishoras
# 2. ln -sf /etc/nginx/sites-available/sishoras /etc/nginx/sites-enabled/sishoras
# 3. mkdir -p /var/www/certbot
# 4. nginx -t && systemctl reload nginx
# 5. certbot certonly --webroot -w /var/www/certbot -d sishoras.saa.com.py
# 6. Una vez obtenido el cert, descomentar el bloque HTTPS (443) de abajo
#    y reemplazar las rutas /etc/ssl/sishoras/ por /etc/letsencrypt/live/sishoras.saa.com.py/
# 7. nginx -t && systemctl reload nginx
# 8. Activar renovación automática: certbot renew --dry-run
# ─────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════
# BLOQUE HTTP (puerto 80)
# CRÍTICO: la location /.well-known DEBE ir ANTES del return 301
# para que certbot pueda resolver el reto http-01.
# ══════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name sishoras.saa.com.py;

    # ── Reto ACME (Let's Encrypt / certbot --webroot) ─────────────
    # Debe ir ANTES del redirect a HTTPS, o certbot obtiene 301.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════
# BLOQUE HTTPS (puerto 443)
# ─ Mientras tengas solo el cert autofirmado usa las rutas
#   /etc/ssl/sishoras/fullchain.pem y /etc/ssl/sishoras/privkey.pem
# ─ Después de obtener Let's Encrypt cambia a:
#   /etc/letsencrypt/live/sishoras.saa.com.py/fullchain.pem
#   /etc/letsencrypt/live/sishoras.saa.com.py/privkey.pem
# ══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sishoras.saa.com.py;

    # ── Certificado ───────────────────────────────────────────────
    # Cambiar a letsencrypt luego de: certbot certonly --webroot ...
    ssl_certificate     /etc/ssl/sishoras/fullchain.pem;
    ssl_certificate_key /etc/ssl/sishoras/privkey.pem;

    # ── Protocolos y cifrados modernos ────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # ── Headers de seguridad ──────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options   "nosniff"                      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Permisos necesarios para cámara (Face ID / selfie) y geolocalización (GPS)
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(self)" always;

    # Tamaño máximo de uploads (logos, CSV, fotos)
    client_max_body_size 10M;

    # ── FastAPI analytics ─────────────────────────────────────────
    location /api/analytics/ {
        rewrite ^/api/analytics/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_read_timeout 300s;
    }

    # ── Node API REST ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_read_timeout 300s;
    }

    # ── WebSocket Socket.io ───────────────────────────────────────
    location /socket.io/ {
        proxy_pass             http://127.0.0.1:4000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade            $http_upgrade;
        proxy_set_header       Connection         "upgrade";
        proxy_set_header       Host               $host;
        proxy_set_header       X-Real-IP          $remote_addr;
        proxy_set_header       X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto  $scheme;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_cache_bypass     $http_upgrade;
    }

    # ── Uploads / assets estáticos ────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Next.js (catch-all) ───────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/sishoras.log;
    error_log  /var/log/nginx/sishoras.error.log;
}
