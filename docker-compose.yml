version: '3.9'

services:
  # ─── Base de Datos ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: asistencia_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-asistencia}
      MYSQL_USER: ${DB_USER:-asistencia_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-asistencia_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - asistencia_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Pub/Sub + Cache) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: asistencia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asistencia_net
    command: redis-server --appendonly yes

  # ─── Core API (Node.js/Express) ───────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: asistencia_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-asistencia}
      DB_USER: ${DB_USER:-asistencia_user}
      DB_PASSWORD: ${DB_PASSWORD:-asistencia_pass}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-cambia_este_secreto_en_produccion}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-otro_secreto_refresh}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Notification channels
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@empresa.com}
      SMTP_TLS: ${SMTP_TLS:-true}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-WAHA}
      WAHA_API_URL: ${WAHA_API_URL:-}
      WAHA_SESSION: ${WAHA_SESSION:-default}
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN:-}
      META_WHATSAPP_PHONE_ID: ${META_WHATSAPP_PHONE_ID:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-HTTP}
      SMS_API_URL: ${SMS_API_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-admin@empresa.com}
      # Document storage
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH:-/app/uploads/documents}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
    volumes:
      - document_uploads:/app/uploads/documents
    ports:
      - "4000:4000"
    networks:
      - asistencia_net

  # ─── ZKTeco Bridge Service ─────────────────────────────────────
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: asistencia_bridge
    restart: unless-stopped
    depends_on:
      - redis
      - api
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      API_URL: http://api:4000
      API_KEY: ${BRIDGE_API_KEY:-bridge_secret_key}
      ZKTECO_POLL_INTERVAL: 30000
    ports:
      - "8080:8080"   # Puerto para recibir PUSH del reloj ZKTeco
    network_mode: host  # Necesario para acceder a relojes en LAN
    # NOTA: Si usas network_mode: host, no aplica 'networks'

  # ─── Analytics Service (Python/FastAPI) ───────────────────────
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: asistencia_analytics
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-asistencia}
      DB_USER: ${DB_USER:-asistencia_user}
      DB_PASSWORD: ${DB_PASSWORD:-asistencia_pass}
      API_KEY: ${ANALYTICS_API_KEY:-analytics_secret_key}
    ports:
      - "5000:5000"
    networks:
      - asistencia_net

  # ─── Dashboard Web (Next.js) ───────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: asistencia_web
    restart: unless-stopped
    depends_on:
      - api
      - analytics
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_ANALYTICS_URL: ${ANALYTICS_URL:-http://localhost:5000}
      NEXT_PUBLIC_SOCKET_URL: ${SOCKET_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    networks:
      - asistencia_net

  # ─── Nginx (Reverse Proxy) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: asistencia_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
      - analytics
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - asistencia_net

volumes:
  mysql_data:
  redis_data:
  document_uploads:

networks:
  asistencia_net:
    driver: bridge
