worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Ocultar versión nginx
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # ─── Upstream ───────────────────────────────────────────────
    upstream api {
        server api:4000;
        keepalive 16;
    }

    upstream web {
        server web:3000;
        keepalive 8;
    }

    # ─── Rate limiting ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ─── HTTP → redirige a HTTPS si hay certs; si no, sirve directo ─
    server {
        listen 80;
        server_name _;

        # Health check sin redirigir (para Docker y smoke-tests)
        location = /api/health {
            proxy_pass         http://api;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            access_log off;
        }

        # Si existen certificados SSL, redirigir
        # Descomentar cuando se configure HTTPS:
        # if ($scheme != "https") {
        #     return 301 https://$host$request_uri;
        # }

        # ── API ──────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;
        }

        # Rate limit extra en auth
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Socket.io ────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── Next.js web ──────────────────────────────────────────
        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Next.js HMR en desarrollo
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $http_connection;
            proxy_read_timeout 120s;
        }

        # Seguridad básica — bloquear archivos sensibles
        location ~* \.(env|git|sql|sh|log)$ {
            deny all;
            return 404;
        }
    }

    # ─── HTTPS (descomentar y configurar certs cuando estén listos) ──
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000" always;
    #     add_header X-Frame-Options SAMEORIGIN;
    #     add_header X-Content-Type-Options nosniff;
    #
    #     # (mismos location blocks que el server HTTP de arriba)
    # }
}
