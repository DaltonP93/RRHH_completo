name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      # Usar npm install en PR porque package.json puede cambiar antes de regenerar package-lock.
      # Esto evita fallos EUSAGE de npm ci por lockfile desfasado y permite validar sintaxis.
      - run: npm install --no-audit --no-fund
      - name: Syntax check
        run: |
          find src -name "*.js" | xargs -I{} node --check {}

  web:
    name: Web — build Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_ANALYTICS_URL: ""
      NEXT_PUBLIC_ANALYTICS_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  analytics:
    name: Analytics — Python lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py || true

  docker:
    name: Docker Compose — config validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: |
          docker compose config --quiet
        env:
          DB_HOST: localhost
          DB_PORT: "3306"
          DB_NAME: asistencia
          DB_USER: asistencia_user
          DB_PASSWORD: test_password
          DB_ROOT_PASSWORD: test_root
          JWT_SECRET: test_jwt_secret_for_ci_only
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only
          BRIDGE_API_KEY: test_bridge_key
          ANALYTICS_API_KEY: test_analytics_key
          FRONTEND_URL: http://localhost:3000
          API_URL: http://localhost:4000
          ANALYTICS_URL: http://localhost:5000
          SOCKET_URL: http://localhost:4000
