name: Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: sishoras-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: false
          tags: sishoras-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_ANALYTICS_URL=
            NEXT_PUBLIC_ANALYTICS_API_KEY=
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  build-analytics:
    name: Build Analytics image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build Analytics Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./analytics
          push: false
          tags: sishoras-analytics:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
